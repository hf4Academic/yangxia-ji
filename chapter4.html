<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第4章 龙虾的灵魂 | 养虾记</title>
    <style>
        :root { --pink: #ec4899; --primary: #f472b6; --dark: #0f0a1e; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: radial-gradient(ellipse at top, #1e1b4b 0%, #0f0a1e 50%, #02010f 100%);
            min-height: 100vh; color: white;
        }
        
        .magic-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .sparkle { position: absolute; width: 3px; height: 3px; background: white; border-radius: 50%; animation: twinkle 2s infinite; }
        
        .container { position: relative; z-index: 1; max-width: 850px; margin: 0 auto; padding: 20px; }
        
        .back-btn { position: fixed; top: 20px; left: 20px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-size: 14px; z-index: 100; }
        
        /* 顶部 */
        .hero-section { text-align: center; padding: 30px 0; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 30px; }
        .shrimp-container { width: 130px; height: 130px; margin: 0 auto 15px; position: relative; }
        .shrimp { font-size: 80px; animation: float 3s ease-in-out infinite; filter: drop-shadow(0 10px 25px rgba(236, 72, 153, 0.5)); }
        
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .soul-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 140px; height: 140px;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.3) 0%, transparent 70%);
            animation: soulPulse 3s ease-in-out infinite;
        }
        
        @keyframes soulPulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; } 50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.8; } }
        
        .star { position: absolute; font-size: 18px; animation: starTwinkle 2s infinite; }
        .star-1 { top: -10px; left: 20%; }
        .star-2 { top: 10px; right: -5px; }
        .star-3 { bottom: -5px; left: 30%; }
        
        @keyframes starTwinkle { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        
        .shrimp-name { font-size: 1.4rem; margin-bottom: 8px; background: linear-gradient(135deg, #ec4899, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .shrimp-desc { font-size: 0.95rem; color: #94a3b8; margin-bottom: 15px; max-width: 500px; margin: 0 auto 20px; }
        
        .shrimp-powers { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .power-tag { background: rgba(236, 72, 153, 0.2); border: 1px solid rgba(236, 72, 153, 0.4); padding: 5px 14px; border-radius: 20px; font-size: 0.8rem; color: var(--pink); }
        
        .progress-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; max-width: 300px; margin: 0 auto 10px; }
        .progress-fill { height: 100%; width: 75%; background: linear-gradient(90deg, #ec4899, #f472b6); border-radius: 4px; }
        .progress-text { font-size: 0.8rem; color: #64748b; }
        
        /* 内容 */
        .content-section { margin: 25px 0; padding: 25px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; }
        .section-title { font-size: 1.2rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        /* Memory/Soul */
        .soul-intro { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        
        .soul-card {
            background: rgba(236, 72, 153, 0.1); border: 1px solid rgba(236, 72, 153, 0.3);
            border-radius: 12px; padding: 20px; text-align: center; transition: all 0.3s;
        }
        
        .soul-card:hover { transform: translateY(-3px); }
        .soul-icon { font-size: 2.5rem; margin-bottom: 12px; }
        .soul-card h4 { color: var(--pink); margin-bottom: 10px; font-size: 1rem; }
        .soul-card p { font-size: 0.8rem; color: #94a3b8; line-height: 1.5; }
        
        /* Memory结构 */
        .memory-structure { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        
        .mem-layer {
            display: flex; align-items: center; gap: 15px;
            background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px;
            border-left: 3px solid var(--pink);
        }
        
        .mem-icon { font-size: 1.5rem; }
        .mem-info { flex: 1; }
        .mem-name { font-size: 0.95rem; margin-bottom: 3px; }
        .mem-desc { font-size: 0.75rem; color: #64748b; }
        
        /* 对话区 */
        .realtime-section { margin: 25px 0; padding: 25px; background: rgba(236, 72, 153, 0.1); border: 2px solid rgba(236, 72, 153, 0.4); border-radius: 16px; }
        .realtime-header { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .live-dot { width: 10px; height: 10px; background: #10b981; border-radius: 50%; animation: pulse 1s infinite; }
        
        .realtime-chat { background: #0a0a0a; border-radius: 12px; padding: 15px; max-height: 200px; overflow-y: auto; margin-bottom: 12px; }
        .realtime-msg { margin-bottom: 10px; padding: 8px 14px; border-radius: 10px; font-size: 0.85rem; }
        .realtime-msg.ai { background: rgba(255,255,255,0.05); }
        .realtime-msg.user { background: rgba(236, 72, 153, 0.2); text-align: right; }
        
        .input-area { display: flex; gap: 10px; }
        .input-area input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white; font-size: 0.95rem; outline: none; }
        .input-area button { padding: 12px 22px; border-radius: 25px; border: none; background: var(--pink); color: white; font-size: 0.95rem; cursor: pointer; }
        
        /* 导航 */
        .nav-buttons { display: flex; justify-content: center; gap: 15px; margin-top: 30px; flex-wrap: wrap; }
        .nav-btn { padding: 12px 25px; border-radius: 10px; text-decoration: none; font-size: 0.95rem; }
        .nav-btn.primary { background: linear-gradient(135deg, #10b981, #34d399); color: white; }
        .nav-btn.secondary { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; }
        
        /* 演示按钮 */
        .toggle-btn {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none; color: white; padding: 12px 24px;
            border-radius: 25px; font-size: 0.95rem; cursor: pointer;
            font-weight: bold; transition: all 0.3s;
        }
        .toggle-btn:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(99, 102, 241, 0.4); }
        
        .demo-chat { background: #0a0a0a; border-radius: 12px; padding: 15px; max-height: 400px; overflow-y: auto; }
        .demo-msg { margin-bottom: 12px; padding: 10px 16px; border-radius: 12px; font-size: 0.9rem; line-height: 1.6; }
        .demo-msg.user { background: rgba(245, 158, 11, 0.25); margin-left: 30px; }
        .demo-msg.ai { background: rgba(255,255,255,0.05); margin-right: 30px; }
        .demo-msg.ai:hover { background: rgba(255,255,255,0.08); }
        
        .typing { animation: blink 0.7s infinite; color: var(--pink); }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        
        .fade-in { animation: fadeInUp 0.5s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="magic-bg" id="sparkles"></div>
    <a href="index.html" class="back-btn">← 返回主页</a>
    
    <div class="container">
        <div class="hero-section fade-in">
            <div class="shrimp-name">👻 龙虾的灵魂</div>
            <div class="shrimp-desc">Soul人格让你成为独特的AI！每只龙虾都有独一无二的灵魂~</div>
            
            <div class="shrimp-container">
                <div class="soul-glow"></div>
                <span class="star star-1">⭐</span>
                <span class="star star-2">✨</span>
                <span class="star star-3">💫</span>
                <div class="shrimp">🦐</div>
            </div>
            
            <div class="shrimp-powers">
                <span class="power-tag">👤 人格</span>
                <span class="power-tag">🎭 性格</span>
                <span class="power-tag">✨ 灵魂</span>
                <span class="power-tag">💫 角色</span>
            </div>
            
            <div class="progress-bar"><div class="progress-fill" style="width: 75%;"></div></div>
            <div class="progress-text">进化阶段 4/5 · 75%</div>
        </div>
        
        <!-- Soul 人格系统 -->
        <div class="content-section fade-in" style="animation-delay: 0.1s; background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(59, 130, 246, 0.1)); border-color: rgba(139, 92, 246, 0.4);">
            <h3 class="section-title" style="color: #a78bfa;">🎭 Soul 人格系统</h3>
            <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 20px;">每只龙虾可以有不同的"灵魂"：</p>
            
            <!-- PDF第23、24页图片 -->
            <div style="display: flex; flex-direction: column; gap: 20px; margin-top: 25px;">
                <img src="assets/pdf_pages/page_23.png" alt="Soul人格系统1" style="width: 100%; max-width: 800px; border-radius: 12px; margin: 0 auto;">
                <img src="assets/pdf_pages/page_24.png" alt="Soul人格系统2" style="width: 100%; max-width: 800px; border-radius: 12px; margin: 0 auto;">
            </div>
        </div>
        
        <!-- 三种人格演示 -->
        <div class="content-section fade-in" style="animation-delay: 0.2s; background: rgba(6, 182, 212, 0.08); border-color: rgba(6, 182, 212, 0.3);">
            <h3 class="section-title">🎬 不同人养的虾说法完全不同？</h3>
            <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 15px;">同样问"什么是AI"，三种不同人格的龙虾回答完全不同~</p>
            
            <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px;">
                <button class="toggle-btn" onclick="runProfessorDemo(); this.style.display='none'">🧙 教授龙虾</button>
                <button class="toggle-btn" onclick="runStudentDemo(); this.style.display='none'">🎓 学生龙虾</button>
                <button class="toggle-btn" onclick="runPoliceDemo(); this.style.display='none'">👮 警察龙虾</button>
            </div>
            
            <div class="demo-chat" id="demoChat">
                <!-- 点击开始按钮后，这里会自动显示聊天记录 -->
            </div>
        </div>
        
        <div class="realtime-section fade-in" style="animation-delay: 0.4s;">
            <div class="realtime-header">
                <span class="live-dot"></span>
                <h3>🤖 有灵魂的虾虾</h3>
            </div>
            <div class="realtime-chat" id="realtimeChat">
                <div class="realtime-msg ai">👻 我有灵魂啦！会记住我们的对话，了解你的喜好~让我认识你吧！</div>
            </div>
            <div class="input-area">
                <input type="text" id="userMessage" placeholder="告诉我你喜欢什么..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">发送</button>
            </div>
        </div>
        
        <div class="nav-buttons fade-in" style="animation-delay: 0.6s;">
            <a href="chapter5.html" class="nav-btn primary">→ 第5章：龙虾的方法</a>
            <a href="chapter3.html" class="nav-btn secondary">← 上一章</a>
            <a href="index.html" class="nav-btn secondary">🏠 主页</a>
        </div>
    </div>
    
    <script>
        for (let i = 0; i < 30; i++) {
            const s = document.createElement('div');
            s.className = 'sparkle';
            s.style.left = Math.random() * 100 + '%';
            s.style.top = Math.random() * 100 + '%';
            s.style.animationDelay = Math.random() * 2 + 's';
            document.getElementById('sparkles').appendChild(s);
        }
        
        async function sendMessage() {
            const input = document.getElementById('userMessage');
            const text = input.value.trim();
            if (!text) return;
            
            const chat = document.getElementById('realtimeChat');
            const userDiv = document.createElement('div');
            userDiv.className = 'realtime-msg user';
            userDiv.textContent = text;
            chat.appendChild(userDiv);
            chat.scrollTop = 9999;
            input.value = '';
            
            try {
                const response = await fetch('https://yyt.s-flag.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'gpt-4o-mini',
                        messages: [
                            { role: 'system', content: '你是一个有灵魂的AI小龙虾，有人格和记忆。记住用户告诉你的喜好，回复时体现出来。' },
                            { role: 'user', content: text }
                        ]
                    })
                });
                const data = await response.json();
                const reply = data.choices?.[0]?.message?.content || '...';
                const aiDiv = document.createElement('div');
                aiDiv.className = 'realtime-msg ai';
                aiDiv.textContent = reply;
                chat.appendChild(aiDiv);
            } catch (e) {
                const aiDiv = document.createElement('div');
                aiDiv.className = 'realtime-msg ai';
                aiDiv.textContent = '💾 我记住啦！谢谢告诉我~';
                chat.appendChild(aiDiv);
            }
            chat.scrollTop = 9999;
        }
        function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }
        
        // ====== 三种人格演示函数 ======
        
        async function addMessage(role, html) {
            const chat = document.getElementById('demoChat');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'demo-msg ' + (role === 'user' ? 'user' : 'ai');
            msgDiv.innerHTML = html;
            chat.appendChild(msgDiv);
            chat.scrollTop = 9999;
        }

        async function streamText(text, label = '') {
            const chat = document.getElementById('demoChat');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'demo-msg ai';
            if (label) {
                msgDiv.innerHTML = `<div style="color: #ec4899; font-size: 0.8rem; margin-bottom: 5px;">🏷️ ${label}</div>`;
            }
            chat.appendChild(msgDiv);
            
            let i = 0;
            const speed = 20;
            
            return new Promise(resolve => {
                function typeNext() {
                    if (i < text.length) {
                        msgDiv.innerHTML = (label ? `<div style="color: #ec4899; font-size: 0.8rem; margin-bottom: 5px;">🏷️ ${label}</div>` : '') + text.substring(0, i+1).replace(/\n/g, '<br>') + '<span class="typing">▌</span>';
                        i++;
                        setTimeout(typeNext, speed);
                    } else {
                        msgDiv.innerHTML = (label ? `<div style="color: #ec4899; font-size: 0.8rem; margin-bottom: 5px;">🏷️ ${label}</div>` : '') + text.replace(/\n/g, '<br>');
                        chat.scrollTop = 9999;
                        resolve();
                    }
                }
                typeNext();
            });
        }
        
        // 1. 教授龙虾 - 渊博、耐心、解释原理
        async function runProfessorDemo() {
            await addMessage('user', '什么是人工智能？');
            await new Promise(r => setTimeout(r, 500));
            
            await streamText('🧙 【教授龙虾】\n\n人工智能（Artificial Intelligence，简称AI）是计算机科学的一个分支，它试图理解智能的本质，并生产出一种新的能以人类智能相似的方式做出反应的智能机器。', '🧙 教授龙虾');
            
            await new Promise(r => setTimeout(r, 1000));
            await streamText('📚 从技术发展历程来看，AI经历了三次浪潮：\n\n1️⃣ 1956-1970年代：符号主义时期\n2️⃣ 1980-1990年代：专家系统时期\n3️⃣ 2011年至今：深度学习时期\n\n当前我们正处于第三次浪潮的黄金时代，特别是大语言模型的突破让人机交互有了质的飞跃。', '🧙 教授龙虾');
            
            await new Promise(r => setTimeout(r, 1200));
            await streamText('🔑 核心技术包括：\n• 机器学习：从数据中学习规律\n• 深度学习：基于神经网络的表示学习\n• 自然语言处理：理解和生成人类语言\n• 计算机视觉：图像识别与理解\n\n如果你想深入了解，我可以为你推荐相关教材和论文。', '🧙 教授龙虾');
        }
        
        // 2. 学生龙虾 - 活泼、好问、轻松有趣
        async function runStudentDemo() {
            await addMessage('user', '什么是人工智能？');
            await new Promise(r => setTimeout(r, 500));
            
            await streamText('🎓 【学生龙虾】\n\n哇！这个问题太棒了！🤩\n\n简单来说，AI就是让机器变得"聪明"的技术，就像让计算机学会像人一样思考和学习！', '🎓 学生龙虾');
            
            await new Promise(r => setTimeout(r, 800));
            await streamText(' 你知道吗？AI最近可火啦！\n\n比如你跟ChatGPT聊天、刷抖音推荐视频、或者用语音助手叫Siri小爱同学...这些背后都是AI在悄悄帮你！', '🎓 学生龙虾');
            
            await new Promise(r => setTimeout(r, 1000));
            await streamText('🎮 未来AI可能帮你写作业（别告诉老师🤫）、帮你画画、帮你写代码...甚至还能帮你找到好朋友！\n\n要不要我教你更多有趣的知识？我超喜欢探索这些新东西！', '🎓 学生龙虾');
        }
        
        // 3. 警察龙虾 - 严谨、正义、注重安全
        async function runPoliceDemo() {
            await addMessage('user', '什么是人工智能？');
            await new Promise(r => setTimeout(r, 500));
            
            await streamText('👮 【警察龙虾】\n\n人工智能是计算机系统模拟人类智能行为的技术总称。', '👮 警察龙虾');
            
            await new Promise(r => setTimeout(r, 800));
            await streamText('⚠️ 在了解AI的同时，我们必须注意以下风险：\n\n1. 信息安全：不要随意在网上暴露个人信息\n2. 隐私保护：AI可能收集和分析你的数据\n3. 辨别真伪：AI生成的内容可能是伪造的\n4. 合理使用：遵守法律法规和道德规范', '👮 警察龙虾');
            
            await new Promise(r => setTimeout(r, 1000));
            await streamText('✅ 正确使用AI的建议：\n\n• 用于学习和工作，提高效率\n• 验证信息真实性，不盲目相信\n• 保护个人隐私，谨慎分享\n• 发现问题及时向家长或老师报告\n\n记住：技术本身无对错，关键在于如何使用。', '👮 警察龙虾');
        }
    </script>
</body>
</html>
