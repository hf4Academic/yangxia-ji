<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第5章 龙虾的方法 | 养虾记</title>
    <style>
        :root { --green: #10b981; --primary: #34d399; --dark: #022c22; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(180deg, #022c22 0%, #064e3b 50%, #022c22 100%);
            min-height: 100vh; color: white;
        }
        
        .bg-pattern { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.1) 0%, transparent 50%); z-index: 0; }
        
        .container { position: relative; z-index: 1; max-width: 850px; margin: 0 auto; padding: 20px; }
        
        .back-btn { position: fixed; top: 20px; left: 20px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-size: 14px; z-index: 100; }
        
        /* 顶部 */
        .hero-section { text-align: center; padding: 30px 0; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 30px; }
        .shrimp-container { width: 130px; height: 130px; margin: 0 auto 15px; position: relative; }
        .shrimp { font-size: 80px; animation: float 3s ease-in-out infinite; filter: drop-shadow(0 10px 25px rgba(16, 185, 129, 0.5)); }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .gear-icon { position: absolute; font-size: 28px; animation: spin 10s linear infinite; }
        .gear-1 { top: 0; right: -5px; }
        .gear-2 { bottom: 5px; left: -10px; animation-direction: reverse; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .shrimp-name { font-size: 1.4rem; margin-bottom: 8px; background: linear-gradient(135deg, #10b981, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .shrimp-desc { font-size: 0.95rem; color: #94a3b8; margin-bottom: 15px; max-width: 500px; margin: 0 auto 20px; }
        
        .shrimp-powers { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .power-tag { background: rgba(16, 185, 129, 0.2); border: 1px solid rgba(16, 185, 129, 0.4); padding: 5px 14px; border-radius: 20px; font-size: 0.8rem; color: var(--green); }
        
        .progress-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; max-width: 300px; margin: 0 auto 10px; }
        .progress-fill { height: 100%; width: 95%; background: linear-gradient(90deg, #10b981, #34d399); border-radius: 4px; }
        .progress-text { font-size: 0.8rem; color: #64748b; }
        
        /* 内容 */
        .content-section { margin: 25px 0; padding: 25px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; }
        .section-title { font-size: 1.2rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        /* Agent Loop */
        .agent-intro { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        
        .agent-card {
            background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 12px; padding: 18px; text-align: center; transition: all 0.3s;
        }
        
        .agent-card:hover { transform: translateY(-3px); }
        .agent-icon { font-size: 2rem; margin-bottom: 10px; }
        .agent-card h4 { color: var(--green); margin-bottom: 8px; font-size: 0.95rem; }
        .agent-card p { font-size: 0.8rem; color: #94a3b8; }
        
        /* Agent Loop流程 */
        .loop-flow { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        
        .loop-step {
            display: flex; align-items: center; gap: 15px;
            background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px;
            border-left: 3px solid var(--green);
        }
        
        .loop-num { 
            width: 30px; height: 30px; background: var(--green); color: #022c22; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 0.9rem; flex-shrink: 0;
        }
        
        .loop-info { flex: 1; }
        .loop-name { font-size: 0.95rem; margin-bottom: 3px; }
        .loop-desc { font-size: 0.75rem; color: #64748b; }
        
        .loop-arrow { font-size: 1.2rem; color: var(--green); }
        
        /* 栗子：写程序 */
        .example-box { background: #0a0a0a; border-radius: 12px; padding: 20px; margin-top: 15px; }
        .example-title { color: var(--green); font-size: 0.95rem; margin-bottom: 15px; font-weight: bold; }
        
        .code-demo { background: #1e1e1e; border-radius: 10px; padding: 15px; font-family: "SF Mono", monospace; font-size: 0.8rem; overflow-x: auto; }
        .code-line { margin-bottom: 8px; }
        .code-keyword { color: #c586c0; }
        .code-func { color: #dcdcaa; }
        .code-string { color: #ce9178; }
        .code-comment { color: #6a9955; }
        
        /* 对话区 */
        .realtime-section { margin: 25px 0; padding: 25px; background: rgba(16, 185, 129, 0.1); border: 2px solid rgba(16, 185, 129, 0.4); border-radius: 16px; }
        .realtime-header { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .live-dot { width: 10px; height: 10px; background: #10b981; border-radius: 50%; animation: pulse 1s infinite; }
        
        .realtime-chat { background: #0a0a0a; border-radius: 12px; padding: 15px; max-height: 200px; overflow-y: auto; margin-bottom: 12px; }
        .realtime-msg { margin-bottom: 10px; padding: 8px 14px; border-radius: 10px; font-size: 0.85rem; }
        .realtime-msg.ai { background: rgba(255,255,255,0.05); }
        .realtime-msg.user { background: rgba(16, 185, 129, 0.2); text-align: right; }
        
        .input-area { display: flex; gap: 10px; }
        .input-area input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white; font-size: 0.95rem; outline: none; }
        .input-area button { padding: 12px 22px; border-radius: 25px; border: none; background: var(--green); color: #022c22; font-size: 0.95rem; cursor: pointer; font-weight: bold; }
        
        /* 导航 */
        .nav-buttons { display: flex; justify-content: center; gap: 15px; margin-top: 30px; flex-wrap: wrap; }
        .nav-btn { padding: 12px 25px; border-radius: 10px; text-decoration: none; font-size: 0.95rem; }
        .nav-btn.primary { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #1a1a2e; }
        .nav-btn.secondary { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; }
        
        .fade-in { animation: fadeInUp 0.5s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <a href="index.html" class="back-btn">← 返回主页</a>
    
    <div class="container">
        <div class="hero-section fade-in">
            <div class="shrimp-name">🧩 龙虾的方法</div>
            <div class="shrimp-desc">Agent自我规划！龙虾学会了"思考方法"，能完成复杂任务——规划步骤、调用工具、自我反思！</div>
            
            <div class="shrimp-container">
                <span class="gear-icon gear-1">⚙️</span>
                <span class="gear-icon gear-2">🔧</span>
                <div class="shrimp">🦐</div>
            </div>
            
            <div class="shrimp-powers">
                <span class="power-tag">🧠 自我规划</span>
                <span class="power-tag">🔄 循环反思</span>
                <span class="power-tag">🛠️ 工具调度</span>
                <span class="power-tag">✅ 任务完成</span>
            </div>
            
            <div class="progress-bar"><div class="progress-fill" style="width: 95%;"></div></div>
            <div class="progress-text">进化阶段 5/5 · 95%</div>
        </div>
        
        <!-- Agent Loop 自我规划 -->
        <div class="content-section fade-in" style="animation-delay: 0.1s; background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(59, 130, 246, 0.1)); border-color: rgba(139, 92, 246, 0.4);">
            <h3 class="section-title" style="color: #a78bfa;">🔄 Agent Loop 自我规划</h3>
            <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 20px;">龙虾会自己思考如何完成任务：</p>
            
            <!-- PDF第20、21页图片 -->
            <div style="display: flex; flex-direction: column; gap: 20px; margin-top: 25px;">
                <img src="assets/pdf_pages/page_20.png" alt="Agent Loop 1" style="width: 100%; max-width: 800px; border-radius: 12px; margin: 0 auto;">
                <img src="assets/pdf_pages/page_21.png" alt="Agent Loop 2" style="width: 100%; max-width: 800px; border-radius: 12px; margin: 0 auto;">
            </div>
        </div>
        
        <div class="content-section fade-in" style="animation-delay: 0.2s; background: linear-gradient(135deg, rgba(251, 191, 36, 0.1), rgba(245, 158, 11, 0.1)); border-color: rgba(251, 191, 36, 0.4);">
            <h3 class="section-title" style="color: #fbbf24;">🎮 古诗词背诵PK</h3>
            <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 20px;">小孩 vs 家长 - 看谁背得更准确！</p>
            
            <!-- 游戏区域 -->
            <div id="gameArea" style="display: flex; flex-direction: column; gap: 20px;">
                <!-- 选择诗词 -->
                <div id="poemSelect" style="text-align: center;">
                    <p style="color: #94a3b8; margin-bottom: 15px;">请选择一首诗开始挑战：</p>
                    <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
                        <button onclick="startGame('静夜思')" style="padding: 12px 20px; border-radius: 25px; border: 2px solid #fbbf24; background: rgba(251, 191, 36, 0.2); color: #fbbf24; font-size: 1rem; cursor: pointer;">📜 静夜思</button>
                        <button onclick="startGame('登鹳雀楼')" style="padding: 12px 20px; border-radius: 25px; border: 2px solid #fbbf24; background: rgba(251, 191, 36, 0.2); color: #fbbf24; font-size: 1rem; cursor: pointer;">📜 登鹳雀楼</button>
                        <button onclick="startGame('春晓')" style="padding: 12px 20px; border-radius: 25px; border: 2px solid #fbbf24; background: rgba(251, 191, 36, 0.2); color: #fbbf24; font-size: 1rem; cursor: pointer;">📜 春晓</button>
                    </div>
                </div>
                
                <!-- PK区域 -->
                <div id="pkArea" style="display: none;">
                    <!-- 当前诗句显示 -->
                    <div id="currentLine" style="text-align: center; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 12px; margin-bottom: 20px;">
                        <span id="poemTitle" style="color: #fbbf24; font-size: 1.1rem; font-weight: bold;"></span>
                        <div id="targetLine" style="color: #e2e8f0; font-size: 1.3rem; margin-top: 10px; letter-spacing: 3px;"></div>
                    </div>
                    
                    <!-- 对战柱子 -->
                    <div style="display: flex; justify-content: center; align-items: flex-end; gap: 60px; height: 250px; padding: 20px;">
                        <!-- 孩子阵营 -->
                        <div style="display: flex; flex-direction: column; align-items: center;">
                            <div style="color: #f472b6; font-weight: bold; margin-bottom: 10px;">👧 孩子</div>
                            <div style="position: relative; width: 80px; height: 200px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden;">
                                <div id="childBar" style="position: absolute; bottom: 0; width: 100%; height: 0%; background: linear-gradient(180deg, #f472b6, #ec4899); transition: height 0.5s ease; border-radius: 10px;"></div>
                                <div id="childScore" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 1.5rem; font-weight: bold; z-index: 10;">0</div>
                            </div>
                        </div>
                        
                        <!-- VS -->
                        <div style="color: #fbbf24; font-size: 2rem; font-weight: bold; align-self: center;">VS</div>
                        
                        <!-- 家长阵营 -->
                        <div style="display: flex; flex-direction: column; align-items: center;">
                            <div style="color: #60a5fa; font-weight: bold; margin-bottom: 10px;">👨 家长</div>
                            <div style="position: relative; width: 80px; height: 200px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden;">
                                <div id="parentBar" style="position: absolute; bottom: 0; width: 100%; height: 0%; background: linear-gradient(180deg, #60a5fa, #3b82f6); transition: height 0.5s ease; border-radius: 10px;"></div>
                                <div id="parentScore" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 1.5rem; font-weight: bold; z-index: 10;">0</div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 控制区域 -->
                    <div style="text-align: center; margin-top: 20px;">
                        <button id="startBtn" onclick="startReciting()" style="padding: 15px 40px; border-radius: 30px; border: none; background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #1c1917; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-bottom: 15px;">🎤 开始背诗</button>
                        <div id="statusText" style="color: #94a3b8; font-size: 0.9rem;">点击按钮或说出"开始"开始背诵</div>
                    </div>
                </div>
                
                <!-- 动画文字容器 -->
                <div id="floatingChars" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000;"></div>
            </div>
        </div>
        
        <div class="realtime-section fade-in" style="animation-delay: 0.4s;">
            <div class="realtime-header">
                <span class="live-dot"></span>
                <h3>🤖 试试让虾虾写程序</h3>
            </div>
            <div class="realtime-chat" id="realtimeChat">
                <div class="realtime-msg ai">🧩 我学会方法了！可以帮你规划任务、写程序、解决复杂问题！试试吧~</div>
            </div>
            <div class="input-area">
                <input type="text" id="userMessage" placeholder="比如：帮我写一个计算器" onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">发送</button>
            </div>
        </div>
        
        <div class="nav-buttons fade-in" style="animation-delay: 0.6s;">
            <a href="chapter6.html" class="nav-btn primary">🛡️ 第6章：龙虾的防御</a>
            <a href="chapter4.html" class="nav-btn secondary">← 上一章</a>
            <a href="index.html" class="nav-btn secondary">🏠 主页</a>
        </div>
    </div>
    
    <script>
        async function sendMessage() {
            const input = document.getElementById('userMessage');
            const text = input.value.trim();
            if (!text) return;
            
            const chat = document.getElementById('realtimeChat');
            const userDiv = document.createElement('div');
            userDiv.className = 'realtime-msg user';
            userDiv.textContent = text;
            chat.appendChild(userDiv);
            chat.scrollTop = 9999;
            input.value = '';
            
            try {
                const response = await fetch('https://yyt.s-flag.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'gpt-4o-mini',
                        messages: [
                            { role: 'system', content: '你是一个有方法的AI小龙虾，会规划任务、写程序。回复简短活泼。' },
                            { role: 'user', content: text }
                        ]
                    })
                });
                const data = await response.json();
                const reply = data.choices?.[0]?.message?.content || '...';
                const aiDiv = document.createElement('div');
                aiDiv.className = 'realtime-msg ai';
                aiDiv.textContent = reply;
                chat.appendChild(aiDiv);
            } catch (e) {
                const aiDiv = document.createElement('div');
                aiDiv.className = 'realtime-msg ai';
                aiDiv.textContent = '🧩 我在规划任务...（演示）';
                chat.appendChild(aiDiv);
            }
            chat.scrollTop = 9999;
        }
        function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }
        
        // ====== 古诗词PK游戏 ======
        const poems = {
            '静夜思': {
                title: '静夜思 - 李白',
                lines: ['床前明月光', '疑是地上霜', '举头望明月', '低头思故乡']
            },
            '登鹳雀楼': {
                title: '登鹳雀楼 - 王之涣',
                lines: ['白日依山尽', '黄河入海流', '欲穷千里目', '更上一层楼']
            },
            '春晓': {
                title: '春晓 - 孟浩然',
                lines: ['春眠不觉晓', '处处闻啼鸟', '夜来风雨声', '花落知多少']
            }
        };
        
        let currentPoem = null;
        let currentLineIndex = 0;
        let childScore = 0;
        let parentScore = 0;
        let isReciting = false;
        let recognition = null;
        
        // 初始化语音识别
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'zh-CN';
            
            recognition.onresult = function(event) {
                let finalTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    }
                }
                if (finalTranscript) {
                    processReciting(finalTranscript);
                }
            };
            
            recognition.onerror = function(event) {
                document.getElementById('statusText').textContent = '语音识别出错，请重试';
            };
            
            recognition.onend = function() {
                if (isReciting) {
                    recognition.start();
                }
            };
        }
        
        function startGame(poemName) {
            currentPoem = poems[poemName];
            currentLineIndex = 0;
            childScore = 0;
            parentScore = 0;
            isReciting = false;
            
            document.getElementById('poemSelect').style.display = 'none';
            document.getElementById('pkArea').style.display = 'block';
            
            document.getElementById('poemTitle').textContent = currentPoem.title;
            updateLine();
            updateScores();
        }
        
        function updateLine() {
            const line = currentPoem.lines[currentLineIndex];
            document.getElementById('targetLine').textContent = line;
        }
        
        function updateScores() {
            const maxScore = 20;
            const childPercent = (childScore / maxScore) * 100;
            const parentPercent = (parentScore / maxScore) * 100;
            
            document.getElementById('childBar').style.height = Math.min(childPercent, 100) + '%';
            document.getElementById('parentBar').style.height = Math.min(parentPercent, 100) + '%';
            document.getElementById('childScore').textContent = childScore;
            document.getElementById('parentScore').textContent = parentScore;
        }
        
        function startReciting() {
            if (!isReciting) {
                isReciting = true;
                document.getElementById('startBtn').textContent = '🛑 停止';
                document.getElementById('statusText').textContent = '请开始背诵...';
                
                if (recognition) {
                    recognition.start();
                }
            } else {
                isReciting = false;
                document.getElementById('startBtn').textContent = '🎤 开始背诗';
                document.getElementById('statusText').textContent = '已停止';
                
                if (recognition) {
                    recognition.stop();
                }
            }
        }
        
        function processReciting(text) {
            if (!isReciting || !currentPoem) return;
            
            const targetLine = currentPoem.lines[currentLineIndex];
            document.getElementById('statusText').textContent = '听到: ' + text;
            
            // 检查每个字
            for (let i = 0; i < targetLine.length; i++) {
                if (text.includes(targetLine[i])) {
                    // 正确，增加分数
                    if (Math.random() > 0.5) {
                        childScore++;
                    } else {
                        parentScore++;
                    }
                    
                    // 显示飘字动画
                    showFloatingChar(targetLine[i]);
                    updateScores();
                }
            }
            
            // 检查是否完成这一句
            let correctCount = 0;
            for (let char of targetLine) {
                if (text.includes(char)) correctCount++;
            }
            
            if (correctCount >= targetLine.length * 0.7) {
                currentLineIndex++;
                if (currentLineIndex >= currentPoem.lines.length) {
                    // 结束游戏
                    endGame();
                } else {
                    updateLine();
                }
            }
        }
        
        function showFloatingChar(char) {
            const container = document.getElementById('floatingChars');
            const el = document.createElement('div');
            el.textContent = char;
            el.style.cssText = `
                position: absolute;
                left: ${30 + Math.random() * 40}%;
                top: 40%;
                font-size: 3rem;
                font-weight: bold;
                color: ${Math.random() > 0.5 ? '#fbbf24' : '#60a5fa'};
                animation: floatUp 1.5s ease-out forwards;
                text-shadow: 0 0 10px rgba(251, 191, 36, 0.8);
            `;
            container.appendChild(el);
            
            setTimeout(() => el.remove(), 1500);
        }
        
        function endGame() {
            isReciting = false;
            if (recognition) recognition.stop();
            
            let winner = childScore > parentScore ? '孩子' : (parentScore > childScore ? '家长' : '平局');
            let message = childScore > parentScore ? '👧 孩子获胜！' : (parentScore > childScore ? '👨 家长获胜！' : '🤝 平局！');
            
            document.getElementById('startBtn').textContent = '🎮 再来一局';
            document.getElementById('statusText').textContent = message;
            document.getElementById('startBtn').onclick = function() {
                document.getElementById('poemSelect').style.display = 'block';
                document.getElementById('pkArea').style.display = 'none';
                document.getElementById('startBtn').onclick = startReciting;
            };
        }
        
        // 添加动画样式
        const style = document.createElement('style');
        style.textContent = `
            @keyframes floatUp {
                0% { opacity: 1; transform: translateY(0) scale(1); }
                100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
